<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Sandbox — Wild Veracruz Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #0a4a6e; --teal: #1a7a8a; --sand: #e8d5b0; --coral: #e07050;
    --foam: #f0ede6; --deep: #051d2e; --leaf: #3a7a50; --gold: #c8962a;
    --correct: #2d7a4a; --wrong: #b84030;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--foam); color: var(--deep); min-height: 100vh; }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* START SCREEN */
  #start {
    background: var(--deep);
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  #start::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 80% 60% at 50% 110%, rgba(26,122,138,0.4) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 15% 80%, rgba(10,74,110,0.4) 0%, transparent 60%);
  }
  .start-inner { position: relative; max-width: 560px; }
  .start-badge {
    display: inline-block; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--coral);
    border: 1px solid rgba(224,112,80,0.4); padding: 0.35em 1.1em;
    border-radius: 99px; margin-bottom: 1.8rem;
  }
  .start-title {
    font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 8vw, 4.5rem);
    font-weight: 900; color: var(--sand); line-height: 1; margin-bottom: 0.4rem;
  }
  .start-title em { font-style: italic; color: var(--teal); }
  .start-subtitle {
    font-size: 1rem; color: rgba(232,213,176,0.6); margin: 1.2rem 0 2.5rem;
    line-height: 1.7; font-weight: 300;
  }
  .start-meta {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }
  .meta-pill {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.8rem; color: rgba(232,213,176,0.5);
  }
  .meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }
  .btn-start {
    display: inline-block; background: var(--teal); color: white;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
    padding: 0.9em 2.5em; border-radius: 99px; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.15s; letter-spacing: 0.04em;
  }
  .btn-start:hover { background: #1d8fa2; transform: translateY(-2px); }
  .btn-start:active { transform: translateY(0); }

  /* QUIZ SCREEN */
  #quiz { background: var(--foam); }

  .quiz-topbar {
    background: var(--deep); padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1px solid rgba(26,122,138,0.2);
  }
  .topbar-logo {
    font-family: 'Playfair Display', serif; font-size: 1rem;
    font-weight: 700; color: var(--sand); letter-spacing: 0.02em;
  }
  .topbar-logo em { font-style: italic; color: var(--teal); }
  .progress-wrap { flex: 1; max-width: 280px; margin: 0 1.5rem; }
  .progress-label { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(232,213,176,0.4); margin-bottom: 0.35rem; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .q-counter { font-size: 0.8rem; color: rgba(232,213,176,0.5); white-space: nowrap; }

  .quiz-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
  .question-card { max-width: 680px; width: 100%; }

  .q-animal-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-size: 0.7rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--teal); background: rgba(26,122,138,0.1);
    border: 1px solid rgba(26,122,138,0.2); padding: 0.3em 0.9em;
    border-radius: 99px; margin-bottom: 1.5rem;
  }
  .q-type-badge {
    display: inline-block; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 0.2em 0.7em; border-radius: 99px;
    margin-left: 0.5rem;
  }
  .q-type-badge.mc { background: rgba(10,74,110,0.1); color: var(--ocean); }
  .q-type-badge.tf { background: rgba(58,122,80,0.1); color: var(--leaf); }

  .q-text {
    font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 3.5vw, 1.8rem);
    font-weight: 700; line-height: 1.35; color: var(--deep); margin-bottom: 2rem;
  }

  /* OPTIONS */
  .options-grid { display: grid; gap: 0.75rem; }
  .option-btn {
    display: flex; align-items: center; gap: 1rem;
    background: white; border: 1.5px solid rgba(10,74,110,0.12);
    border-radius: 14px; padding: 1rem 1.25rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    text-align: left; transition: border-color 0.15s, background 0.15s, transform 0.1s;
    color: var(--deep); width: 100%;
  }
  .option-btn:hover:not(:disabled) { border-color: rgba(26,122,138,0.4); background: rgba(26,122,138,0.04); transform: translateX(3px); }
  .option-btn:disabled { cursor: default; transform: none; }
  .option-letter {
    min-width: 32px; height: 32px; border-radius: 50%;
    background: rgba(10,74,110,0.07); border: 1.5px solid rgba(10,74,110,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 500; color: var(--ocean);
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .option-btn.correct { background: rgba(45,122,74,0.08); border-color: var(--correct); }
  .option-btn.correct .option-letter { background: var(--correct); border-color: var(--correct); color: white; }
  .option-btn.wrong { background: rgba(184,64,48,0.08); border-color: var(--wrong); }
  .option-btn.wrong .option-letter { background: var(--wrong); border-color: var(--wrong); color: white; }
  .option-btn.show-correct { background: rgba(45,122,74,0.05); border-color: rgba(45,122,74,0.3); }
  .option-btn.show-correct .option-letter { background: rgba(45,122,74,0.15); border-color: var(--correct); color: var(--correct); }

  /* TF BUTTONS */
  .tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .tf-btn {
    padding: 1.5rem 1rem; border-radius: 16px; border: 1.5px solid rgba(10,74,110,0.12);
    background: white; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem; font-weight: 500; color: var(--deep);
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    text-align: center;
  }
  .tf-btn:hover:not(:disabled) { transform: translateY(-3px); border-color: rgba(26,122,138,0.4); background: rgba(26,122,138,0.04); }
  .tf-btn:disabled { cursor: default; transform: none; }
  .tf-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
  .tf-btn.correct { background: rgba(45,122,74,0.08); border-color: var(--correct); }
  .tf-btn.wrong { background: rgba(184,64,48,0.08); border-color: var(--wrong); }
  .tf-btn.show-correct { background: rgba(45,122,74,0.05); border-color: rgba(45,122,74,0.3); }

  /* FEEDBACK */
  .feedback-box {
    margin-top: 1.5rem; padding: 1.1rem 1.4rem; border-radius: 12px;
    font-size: 0.92rem; line-height: 1.65; display: none;
    border-left: 4px solid transparent;
  }
  .feedback-box.correct { background: rgba(45,122,74,0.07); border-left-color: var(--correct); color: #1d5530; }
  .feedback-box.wrong { background: rgba(184,64,48,0.07); border-left-color: var(--wrong); color: #7a1a10; }
  .feedback-label { font-weight: 500; margin-bottom: 0.3rem; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; }

  .btn-next {
    margin-top: 2rem; display: none; background: var(--deep); color: var(--sand);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
    padding: 0.85em 2.2em; border-radius: 99px; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.15s; letter-spacing: 0.04em;
  }
  .btn-next:hover { background: var(--ocean); transform: translateY(-1px); }

  /* RESULTS SCREEN */
  #results {
    background: var(--deep); align-items: center; justify-content: center;
    text-align: center; padding: 3rem 2rem;
  }
  #results::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(26,122,138,0.35) 0%, transparent 65%);
  }
  .results-inner { position: relative; max-width: 560px; width: 100%; }
  .score-ring {
    width: 140px; height: 140px; border-radius: 50%;
    border: 3px solid rgba(26,122,138,0.25);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 2rem; position: relative; background: rgba(26,122,138,0.08);
  }
  .score-num { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; color: var(--sand); line-height: 1; }
  .score-denom { font-size: 0.8rem; color: rgba(232,213,176,0.4); margin-top: 0.2rem; }
  .results-title { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 5vw, 2.6rem); font-weight: 900; color: var(--sand); margin-bottom: 0.8rem; }
  .results-msg { font-size: 1rem; color: rgba(232,213,176,0.65); font-weight: 300; line-height: 1.7; margin-bottom: 2.5rem; max-width: 440px; margin-left: auto; margin-right: auto; }
  .results-breakdown { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; text-align: left; border: 1px solid rgba(26,122,138,0.2); }
  .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label { color: rgba(232,213,176,0.6); }
  .breakdown-val { font-weight: 500; }
  .breakdown-val.green { color: #6fcf97; }
  .breakdown-val.red { color: #f28b82; }
  .btn-retry {
    display: inline-block; background: var(--teal); color: white;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
    padding: 0.9em 2.5em; border-radius: 99px; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.15s; margin-right: 1rem;
  }
  .btn-retry:hover { background: #1d8fa2; transform: translateY(-2px); }
  .btn-back {
    display: inline-block; background: transparent; color: rgba(232,213,176,0.5);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 400;
    padding: 0.9em 1.8em; border-radius: 99px;
    border: 1px solid rgba(232,213,176,0.15); cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-back:hover { border-color: rgba(232,213,176,0.35); color: rgba(232,213,176,0.8); }

  @media (max-width: 480px) {
    .quiz-topbar { flex-wrap: wrap; gap: 0.5rem; }
    .progress-wrap { order: 3; max-width: 100%; margin: 0; flex: 0 0 100%; }
    .tf-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="screen active" id="start">
  <div class="start-inner">
    <div class="start-badge">Project Sandbox · Wildlife Quiz</div>
    <h1 class="start-title">How well do you know <em>Wild Veracruz?</em></h1>
    <p class="start-subtitle">Test what you've learned about the five wild species that share our city with us.</p>
    <div class="start-meta">
      <span class="meta-pill"><span class="meta-dot"></span> 15 questions</span>
      <span class="meta-pill"><span class="meta-dot" style="background:var(--coral)"></span> Multiple choice & True/False</span>
      <span class="meta-pill"><span class="meta-dot" style="background:var(--gold)"></span> At your own pace</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">Start the quiz →</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="quiz">
  <div class="quiz-topbar">
    <div class="topbar-logo">Wild <em>Veracruz</em></div>
    <div class="progress-wrap">
      <div class="progress-label">Progress</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="q-counter" id="q-counter">1 / 15</div>
  </div>
  <div class="quiz-body">
    <div class="question-card">
      <div class="q-animal-tag" id="q-animal-tag"></div>
      <div class="q-text" id="q-text"></div>
      <div id="options-container"></div>
      <div class="feedback-box" id="feedback-box">
        <div class="feedback-label" id="feedback-label"></div>
        <div id="feedback-text"></div>
      </div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next question →</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="results">
  <div class="results-inner">
    <div class="score-ring">
      <div class="score-num" id="score-num">0</div>
      <div class="score-denom" id="score-denom">/ 15</div>
    </div>
    <h2 class="results-title" id="results-title"></h2>
    <p class="results-msg" id="results-msg"></p>
    <div class="results-breakdown">
      <div class="breakdown-row"><span class="breakdown-label">Correct answers</span><span class="breakdown-val green" id="bd-correct"></span></div>
      <div class="breakdown-row"><span class="breakdown-label">Incorrect answers</span><span class="breakdown-val red" id="bd-wrong"></span></div>
      <div class="breakdown-row"><span class="breakdown-label">Score</span><span class="breakdown-val" id="bd-pct" style="color:var(--sand)"></span></div>
    </div>
    <button class="btn-retry" onclick="retryQuiz()">Try again →</button>
    <button class="btn-back" onclick="goStart()">Back to start</button>
  </div>
</div>

<script>
const questions = [
  {
    animal: "🌊 West Indian Manatee",
    type: "mc",
    q: "What is the leading cause of injury and death for manatees in the Veracruz lagoons?",
    options: ["Shark attacks", "Boat propeller strikes", "Entanglement in plastic bags", "Toxic algae blooms"],
    correct: 1,
    feedback: "Correct! Boat propeller strikes are the #1 cause of injury and death for manatees in the region, as watercraft traffic in the lagoons has grown sharply."
  },
  {
    animal: "🌊 West Indian Manatee",
    type: "tf",
    q: "True or False: Manatees are most closely related to whales and dolphins.",
    options: ["True", "False"],
    correct: 1,
    feedback: "False! Despite living in water, manatees are actually most closely related to elephants. Their common ancestor lived on land about 60 million years ago."
  },
  {
    animal: "🌊 West Indian Manatee",
    type: "mc",
    q: "How much of its body weight can a manatee eat in seagrass each day?",
    options: ["1%", "5%", "10%", "20%"],
    correct: 2,
    feedback: "Correct! Manatees can eat up to 10% of their body weight in seagrass per day, spending 6–8 hours grazing. That's why they're called 'sea cows'."
  },
  {
    animal: "🪸 Elkhorn Coral",
    type: "mc",
    q: "Where are the coral reefs of Veracruz located?",
    options: ["Laguna de Tamiahua", "Laguna de Mandinga", "Parque Nacional Sistema Arrecifal Veracruzano", "Río Jamapa estuary"],
    correct: 2,
    feedback: "Correct! The Parque Nacional Sistema Arrecifal Veracruzano is located just offshore from the port and hotel zone, making it one of the most urban-adjacent reef systems in the Gulf of Mexico."
  },
  {
    animal: "🪸 Elkhorn Coral",
    type: "tf",
    q: "True or False: Coral is a plant that produces its own food through photosynthesis.",
    options: ["True", "False"],
    correct: 1,
    feedback: "False! Coral is an animal. Each colony is made of individual polyps that use tentacles to capture prey. They do partner with algae (zooxanthellae) for extra energy, but the coral itself is an animal."
  },
  {
    animal: "🪸 Elkhorn Coral",
    type: "mc",
    q: "Bright, shiny-looking coral in Veracruz waters is usually a sign of…",
    options: ["A healthy and thriving reef", "Bleaching stress — the coral may be dying", "High water temperature being ideal", "A new coral colony forming"],
    correct: 1,
    feedback: "Correct! Bleaching happens when corals expel their symbiotic algae under stress, turning white. A shiny white appearance is actually a warning sign that conditions are dangerous for the reef."
  },
  {
    animal: "🐾 Virginia Opossum",
    type: "mc",
    q: "The tlacuache (Virginia opossum) is Mexico's only native…",
    options: ["Rodent", "Marsupial", "Reptile", "Insectivore"],
    correct: 1,
    feedback: "Correct! The tlacuache is Mexico's only native marsupial — a cousin of kangaroos and koalas. It carries its babies in a small pouch on its belly."
  },
  {
    animal: "🐾 Virginia Opossum",
    type: "tf",
    q: "True or False: Adult tlacuaches sleep hanging upside down from their tails.",
    options: ["True", "False"],
    correct: 1,
    feedback: "False! This is a common myth. Adult tlacuaches are too heavy to hang from their tails. Only babies can do it, and just for a few seconds. Adults use their tails to grip branches while climbing."
  },
  {
    animal: "🐾 Virginia Opossum",
    type: "mc",
    q: "What is the #1 cause of death for adult tlacuaches in Veracruz?",
    options: ["Dog attacks", "Poisoning by humans", "Traffic accidents", "Habitat loss"],
    correct: 2,
    feedback: "Correct! Tlacuaches are slow and have poor eyesight, making road traffic the biggest killer. Driving carefully in residential areas and near green zones at night can save their lives."
  },
  {
    animal: "🐢 Kemp's Ridley Sea Turtle",
    type: "mc",
    q: "How is the gender of a sea turtle hatchling determined?",
    options: ["By its genes (XX or XY)", "By the temperature of the nest", "By the depth of the nest", "Randomly, with equal probability"],
    correct: 1,
    feedback: "Correct! Sea turtle gender is determined by nest temperature. Warmer nests produce more females; cooler nests produce more males. Climate change is making nests warmer, which is skewing the ratio toward too many females."
  },
  {
    animal: "🐢 Kemp's Ridley Sea Turtle",
    type: "tf",
    q: "True or False: The Kemp's Ridley sea turtle is the world's most endangered sea turtle.",
    options: ["True", "False"],
    correct: 0,
    feedback: "True! The Kemp's Ridley (Lepidochelys kempii) is classified as Critically Endangered by the IUCN. It is the rarest sea turtle in the world, and the Gulf of Mexico is its primary habitat."
  },
  {
    animal: "🐢 Kemp's Ridley Sea Turtle",
    type: "mc",
    q: "Why do sea turtles appear to 'cry' when they come ashore on the beach?",
    options: ["They are afraid and in pain", "They secrete excess salt through glands near their eyes", "Their eyes dry out without seawater", "They are communicating with their hatchlings"],
    correct: 1,
    feedback: "Correct! Sea turtles have special salt glands near their eyes that excrete the excess salt they absorb from seawater. It looks like crying, but it's actually a smart water-saving adaptation."
  },
  {
    animal: "🦀 Blue Land Crab",
    type: "mc",
    q: "What is the scientific name of the blue land crab found in Veracruz?",
    options: ["Callinectes sapidus", "Cardisoma guanhumi", "Gecarcinus lateralis", "Portunus pelagicus"],
    correct: 1,
    feedback: "Correct! Cardisoma guanhumi is the blue land crab of Veracruz. It's important not to confuse it with the jaiba (Callinectes sapidus), which is a different, sea-dwelling species."
  },
  {
    animal: "🦀 Blue Land Crab",
    type: "tf",
    q: "True or False: The blue land crab (Cardisoma guanhumi) spends most of its life in the sea.",
    options: ["True", "False"],
    correct: 1,
    feedback: "False! The blue land crab is a terrestrial species — it lives on land in burrows in coastal forests and mangrove edges. It only returns to the ocean for one purpose: to release its larvae into the sea."
  },
  {
    animal: "🦀 Blue Land Crab",
    type: "mc",
    q: "When a blue land crab molts (sheds its shell), what happens?",
    options: ["It grows a new shell instantly", "It becomes soft and defenseless for several hours", "It hides in the water until the new shell hardens", "It produces a toxin to protect itself"],
    correct: 1,
    feedback: "Correct! After molting, blue land crabs are completely soft and extremely vulnerable. They hide deep in their burrows for several hours until their new exoskeleton hardens enough to protect them."
  }
];

let currentQ = 0;
let score = 0;
let answered = false;
let shuffledQ = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  shuffledQ = shuffle(questions);
  currentQ = 0;
  score = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = shuffledQ[currentQ];
  const total = shuffledQ.length;

  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(currentQ / total) * 100}%`;
  document.getElementById('q-animal-tag').innerHTML =
    `${q.animal} <span class="q-type-badge ${q.type}">${q.type === 'mc' ? 'Multiple choice' : 'True / False'}</span>`;
  document.getElementById('q-text').textContent = q.q;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  const feedback = document.getElementById('feedback-box');
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  document.getElementById('btn-next').style.display = 'none';

  if (q.type === 'tf') {
    const grid = document.createElement('div');
    grid.className = 'tf-grid';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'tf-btn';
      btn.innerHTML = `<span class="tf-icon">${i === 0 ? '✓' : '✗'}</span>${opt}`;
      btn.onclick = () => selectAnswer(i, q, 'tf');
      grid.appendChild(btn);
    });
    container.appendChild(grid);
  } else {
    const letters = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
      btn.onclick = () => selectAnswer(i, q, 'mc');
      container.appendChild(btn);
    });
  }
}

function selectAnswer(chosen, q, type) {
  if (answered) return;
  answered = true;
  const isCorrect = chosen === q.correct;
  if (isCorrect) score++;

  const container = document.getElementById('options-container');
  const btns = container.querySelectorAll('button');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) {
      btn.classList.add(type === 'tf' ? 'correct' : 'correct');
    }
    if (i === chosen && !isCorrect) {
      btn.classList.add('wrong');
    }
    if (i !== chosen && i !== q.correct) {
      btn.style.opacity = '0.4';
    }
  });

  const feedback = document.getElementById('feedback-box');
  const feedbackLabel = document.getElementById('feedback-label');
  const feedbackText = document.getElementById('feedback-text');

  feedback.style.display = 'block';
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`;
  feedbackLabel.textContent = isCorrect ? '✓ Correct!' : '✗ Not quite';
  feedbackText.textContent = q.feedback;

  const btnNext = document.getElementById('btn-next');
  btnNext.style.display = 'inline-block';
  btnNext.textContent = currentQ < shuffledQ.length - 1 ? 'Next question →' : 'See my results →';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= shuffledQ.length) {
    showResults();
  } else {
    renderQuestion();
    document.querySelector('.quiz-body').scrollIntoView({ behavior: 'smooth' });
  }
}

function showResults() {
  showScreen('results');
  const total = shuffledQ.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('score-num').textContent = score;
  document.getElementById('score-denom').textContent = `/ ${total}`;
  document.getElementById('bd-correct').textContent = score;
  document.getElementById('bd-wrong').textContent = total - score;
  document.getElementById('bd-pct').textContent = `${pct}%`;

  let title, msg;
  if (pct === 100) {
    title = "Perfect score!";
    msg = "You know Wild Veracruz inside and out. These animals are lucky to have people like you paying attention.";
  } else if (pct >= 80) {
    title = "Excellent work!";
    msg = "You know your local wildlife really well. A quick review of the campaign page will help you get that last few questions next time.";
  } else if (pct >= 60) {
    title = "Good effort!";
    msg = "You've got a solid foundation. Head back to the Wild Veracruz page to review the animals you found tricky — they'll thank you for it.";
  } else if (pct >= 40) {
    title = "Keep exploring!";
    msg = "There's a lot more to discover. Take some time with the Wild Veracruz campaign page and then give this quiz another try!";
  } else {
    title = "Just getting started!";
    msg = "The wildlife of Veracruz has some surprising secrets. Visit the campaign page, read about each species, and come back — you'll do much better next time!";
  }
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-msg').textContent = msg;
}

function retryQuiz() { startQuiz(); }
function goStart() { showScreen('start'); }
</script>
</body>
</html>
